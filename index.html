<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduGamify - Sistema de Gamificação</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <h1>🏆 EduGamify</h1>
        <p>Gamificação Educacional - Com Supabase</p>
      </div>
      <div class="user-type">
        <button class="btn-role professor active" onclick="switchRole('professor')">👨‍🏫 Professor</button>
        <button class="btn-role aluno" onclick="switchRole('aluno')">👨‍🎓 Aluno</button>
      </div>
    </div>

    <!-- Dashboard Professor -->
    <div id="professorDashboard" class="dashboard active">
      <div class="card">
        <h2>⚙️ Configurar Pontuação</h2>
        <div class="flex">
          <div class="stats">Presença: <input type="number" id="pontosPresenca" value="5" style="width:60px"> pts</div>
          <div class="stats">Tarefa: <input type="number" id="pontosTarefa" value="10" style="width:60px"> pts</div>
          <div class="stats">Participação: <input type="number" id="pontosParticipacao" value="10" style="width:60px">
            pts</div>
        </div>
      </div>

      <div class="card">
        <h2>👥 Alunos</h2>
        <div class="student-list">
          <table id="tabelaAlunos">
            <thead>
              <tr>
                <th>Aluno</th>
                <th>Pontos</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="listaAlunosBody"></tbody>
          </table>
        </div>
        <div class="flex">
          <input type="text" id="novoAlunoNome" placeholder="Nome do novo aluno">
          <button class="btn-primary" onclick="adicionarAluno()">➕ Adicionar Aluno</button>
          <button class="btn-primary" onclick="resetarPontuacaoGeral()">🔄 Resetar Pontos</button>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <h2>📊 Desempenho</h2>
          <div id="estatisticasTurma"></div>
        </div>
        <div class="card">
          <h2>🎁 Solicitações Pendentes</h2>
          <div id="resgatesPendentes"></div>
        </div>
      </div>

      <div class="card">
        <h2>🏅 Recompensas</h2>
        <div id="catalogoRecompensasProfessor"></div>
        <div class="flex">
          <input type="text" id="novaRecompensaNome" placeholder="Nome">
          <input type="number" id="novaRecompensaCusto" placeholder="Custo">
          <button class="btn-primary" onclick="adicionarRecompensa()">➕ Adicionar</button>
        </div>
      </div>
    </div>

    <!-- Dashboard Aluno -->
    <div id="alunoDashboard" class="dashboard">
      <div class="grid-2">
        <div class="card">
          <h2>🌟 Meus Pontos</h2>
          <div class="saldo" id="alunoSaldo">0</div>
        </div>
        <div class="card">
          <h2>🏆 Ranking</h2>
          <div id="rankingAluno"></div>
        </div>
      </div>
      <div class="card">
        <h2>📋 Histórico</h2>
        <div id="alunoHistorico"></div>
      </div>
      <div class="card">
        <h2>🎁 Resgatar</h2>
        <div id="recompensasAluno"></div>
      </div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>

</html>
